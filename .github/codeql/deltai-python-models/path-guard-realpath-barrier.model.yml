# CodeQL models-as-data: treat paths returned by path_guard.realpath_under as safe for
# py/path-injection sinks. Runtime behavior: realpath + expanduser + normpath, then must
# equal the anchor or start with anchor + os.sep (see project/path_guard.py).
#
# resolve_tool_path resolves user paths under allowed filesystem roots (DELTAI_WORKSPACE,
# DELTAI_REPO_ROOT, ~/deltai); same trust boundary as realpath_under for tool sinks.
extensions:
  - addsTo:
      pack: codeql/python-all
      extensible: barrierModel
    data:
      - ["path_guard", "Member[realpath_under].ReturnValue", "path-injection"]
      - ["path_guard", "Member[resolve_tool_path].ReturnValue", "path-injection"]
