name: CI

on:
  push:
    branches: [main, personal]
  pull_request:
    branches: [main, personal]

permissions:
  contents: read

jobs:
  lint-and-test:
    uses: ./.github/workflows/python-verify.yml
    with:
      pytest_args: '-q -m "not slow"'
      collect_junit: false
      run_ruff_format_check: false
