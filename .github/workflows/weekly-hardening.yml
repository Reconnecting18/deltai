name: Weekly hardening

# Weekly verify + diagnostics; opens a bot PR when Ruff can apply safe fixes.
# Offset from CodeQL (Sat 05:22 UTC) to spread load.
on:
  schedule:
    - cron: "35 6 * * 1"
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Prepare diagnostics directory
        run: mkdir -p diagnostics

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src/delta --ignore-missing-imports

      - name: Run tests (JUnit XML)
        run: python -m pytest -q --junitxml=diagnostics/pytest-junit.xml

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-hardening-diagnostics
          path: diagnostics/
          if-no-files-found: warn

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Weekly hardening — verify"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Ruff / Mypy / Pytest | See job log |"
            echo ""
            echo "- **This run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- **Code scanning (CodeQL):** ${{ github.server_url }}/${{ github.repository }}/security/code-scanning"
            echo ""
            echo "Download **weekly-hardening-diagnostics** for Pytest JUnit XML (\`diagnostics/pytest-junit.xml\`)."
          } >> "$GITHUB_STEP_SUMMARY"

  propose_ruff_fixes:
    name: Propose Ruff fixes
    needs: verify
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Apply Ruff fixes and format
        run: |
          ruff check --fix src tests
          ruff format src tests

      - name: Branch name
        id: branch
        shell: bash
        run: echo "name=chore/ruff-auto-fixes-$(date -u +%Y%m%d)-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: apply Ruff lint fixes and format"
          branch: ${{ steps.branch.outputs.name }}
          title: "chore: weekly Ruff auto-fixes"
          body: |
            Automated weekly run: `ruff check --fix` and `ruff format` on `src/` and `tests/`.

            Opened after the **Weekly hardening / Verify** job passed. Please review and merge.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          delete-branch: true
