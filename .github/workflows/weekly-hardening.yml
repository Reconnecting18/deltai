name: Weekly hardening

# Weekly verify + diagnostics; opens a bot PR when Ruff can apply safe fixes.
# Offset from CodeQL (Sat 05:22 UTC) to spread load.
on:
  schedule:
    - cron: "35 6 * * 1"
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/python-verify.yml
    with:
      pytest_args: "-q"
      collect_junit: true
      run_ruff_format_check: true

  pip_audit:
    name: pip-audit
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install "pip-audit>=2.7"

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit

  propose_ruff_fixes:
    name: Propose Ruff fixes
    needs: verify
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Apply Ruff fixes and format
        run: |
          ruff check --fix src tests
          ruff format src tests

      - name: Branch name
        id: branch
        shell: bash
        run: echo "name=chore/ruff-auto-fixes-$(date -u +%Y%m%d)-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: apply Ruff lint fixes and format"
          branch: ${{ steps.branch.outputs.name }}
          title: "chore: weekly Ruff auto-fixes"
          body: |
            Automated weekly run: `ruff check --fix` and `ruff format` on `src/` and `tests/`.

            Opened after the **Weekly hardening / Verify** job passed. Please review and merge.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          delete-branch: true
